<!DOCTYPE html>
<html lang="es">

<head>
    <title>Alke Wallet - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsividad! -->
    <meta name="author" content="Nicolás Krebs - nikrebs99@gmail.com">
    <meta name="description" content="Mi primera estafa piramidal">
    <link rel="shortcut icon" href="../assets/svg/bank-svgrepo-com.svg" type="image/x-icon">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <!-- <style> texto </style> fue obliterado para traer al *benevolente emperador link* -->

    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- El estilo de concepto de wallet!-->


</head>

<body>
    <div class="container">
        <h2>Alke Wallet - Login </h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="admin@gmail.com">
            </div>
            <div class="form-group">

                <label for="password">Password:</label>
                <input type="password" class="form-control" id="password" placeholder="contraseña">
            </div>

            <div class="contenedor-botones" style="align-items: center;">
                <button type="button" id="btnEntrar" class="btn btn-primary">Entrar</button>
                <button type="button" id="btnIrRegistro" class="btn btn-info">Registrarse</button>

                <span id="btnAyuda" class="badge badge-pill badge-secondary" title="Haz clic para más información"
                    style="cursor: pointer; font-size: 1rem; padding: 5px 10px;">
                    ?
                </span>
            </div>
    </div>
    </div>
    </form>
    </div>

    <footer id="footerGlobal"> <!-- un footer para dominarlos a todos --> </footer>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"> // para animaciones y cositas</script> 
    <script
        src="../assets/js/utilidades.js"> // jquery primero como "motor" y las "utilidades funcionales" después</script>

    <script>
        // el gorrito! $(document).ready() asegura que la página esté lista antes de ejecutar el código
        $(document).ready(function () {

            let usuariosGuardados = localStorage.getItem('usuariosBanco');
            // localStorage.clear() // Por si necesito limpiar usuarioIniciales
            if (usuariosGuardados === null) {
                const usuariosIniciales = [
                    { email: "admin@gmail.com", password: "contraseña", saldo: 999666 },
                    { email: "testing@gmail.com", password: "12345asd", saldo: 0 }
                ];
                localStorage.setItem('usuariosBanco', JSON.stringify(usuariosIniciales));
            }
            // --- FIN LÓGICA DE "BASE DE DATOS" ---

            //  Boton para entrar
            $('#btnEntrar').on('click', function () {
                const emailIngresado = $('#email').val();
                const passwordIngresada = $('#password').val();

                const listaUsuarios = JSON.parse(localStorage.getItem('usuariosBanco'));

                const usuarioValido = listaUsuarios.find(function (usuario) {
                    return usuario.email === emailIngresado && usuario.password === passwordIngresada;
                });

                if (usuarioValido) {
                    mostrarMensaje("¡Credenciales correctas!", "Bienvenido a Alke Wallet.", "exito", "menu.html");
                    localStorage.setItem('usuarioActivo', usuarioValido.email);

                } else {
                    mostrarMensaje("Error de Ingreso", "Tus credenciales son incorrectas. Intenta nuevamente.", "error");
                    // Vaciamos los campos
                    $('#email').val("");
                    $('#password').val("");
                    // Devolvemos el cursor a email
                    $('#email').focus();
                }
            });

            // EVENTO CLIC DEL BOTÓN REGISTRARSE
            $('#btnIrRegistro').on('click', function () {
                window.location.href = "registro.html";
            });


            $('#btnAyuda').on('click', function () {
                mostrarMensaje("INFORMACIÓN DE INGRESO:", "• Usuarios nuevos: Deben ir a la pestaña 'Registrarse' para crear una cuenta nueva.\n\n• admin@gmail.com // contraseña para ser usada como invitado temporal.");
            });
        }); // Fin del document.ready
    </script>

</body>

</html>
