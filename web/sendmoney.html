<!DOCTYPE html>
<html lang="es">

<head>
    <title>Alke Wallet - Enviar Dinero</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nicolás Krebs">
    <link rel="shortcut icon" href="../assets/svg/bank-svgrepo-com.svg" type="image/x-icon">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <!-- <style></style> fue obliterado para traer al *benevolente emperador link* -->
    <link rel="stylesheet" href="../assets/css/style.css">


    <style>
        .contenedor-botones {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .list-group-item {
            color: #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s;
            /* Animación suave al seleccionar */
        }

        /* Estilo cuando un contacto está seleccionado */
        .contacto-seleccionado {
            background-color: #deff9a !important;
            border-color: #8bc34a;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
        }

        .contact-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .contact-details {
            font-size: 0.85em;
            color: #555;
        }

        .caja-gris {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Enviar Dinero</h2>

        <div class="caja-gris">
            <h4>Agregar Nuevo</h4>
            <div class="form-group">
                <input type="text" class="form-control mb-2" id="nuevoNombre" placeholder="Nombre del contacto">
                <input type="text" class="form-control mb-2" id="nuevoBanco" placeholder="Banco (Ej. Banco Asado)">
                <input type="text" class="form-control mb-2" id="nuevoRut" placeholder="RUN (RUT)">
            </div>
            <button type="button" id="btnAgregar" class="btn btn-success btn-sm">Guardar Contacto</button>
        </div>

        <div class="caja-gris" style="border: 1px solid #deff9a;">
            <h4>Datos de Transferencia</h4>
            <div class="form-group">
                <label for="montoTransferencia">Monto a enviar ($):</label>
                <input type="number" class="form-control" id="montoTransferencia" placeholder="Ej. 5000" min="1">
            </div>
            <p class="mb-0" style="color: #deff9a; font-size: 0.9em;">Tu saldo disponible: $<span
                    id="mostrarSaldo">0</span></p>
        </div>

        <h3>Mis Contactos</h3>
        <p style="font-size: 0.8em; color: #ccc;">Haz clic en "Seleccionar" en el contacto al que deseas enviar dinero.
        </p>
        <ul id="contactList" class="list-group mb-4"></ul>

        <div class="contenedor-botones">
            <button type="button" id="btnTransferir" class="btn btn-primary btn-lg w-100 mb-2" disabled>Transferir a
                Seleccionado</button>
            <a href="menu.html" class="btn btn-secondary w-100">Volver al Menú Principal</a>
        </div>
    </div>

    <footer id="footerGlobal"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js">// este html no ocupa jquery, porque está funcional y es demasiado 
        // trabajo re-adaptar el sistema de variables al ya estar funcional. Sin embargo, las utilidades.js si lo requiere para un correcto funcionamiento
        // del reloj y footer.</script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <script
        src="../assets/js/utilidades.js"> // jquery primero como "motor" y las "utilidades funcionales" después</script>
    <script>
        // Usuario activo o echar
        const emailActivo = localStorage.getItem('usuarioActivo');
        if (emailActivo === null) {
            mostrarMensaje("Cuidado", "Debes iniciar sesión primero.", "error", "index.html");

        } else {  // Sé que está horrible, pero era la unica manera de arreglar la "seguridad" sin usar throw error, que me parece trampa xD

            let listaUsuarios = JSON.parse(localStorage.getItem('usuariosBanco'));
            let miUsuario = listaUsuarios.find(user => user.email === emailActivo);

            // refill por si la cuenta le faltan datos
            if (miUsuario.contactos === undefined) miUsuario.contactos = [];
            if (miUsuario.saldo === undefined) miUsuario.saldo = 0;

            // Mostrar saldo actual en la caja de transferencia asdasd
            document.getElementById('mostrarSaldo').innerText = miUsuario.saldo;

            // Variable global para saber a quién le vamos a enviar la plata
            let contactoSeleccionado = null;

            // aparaced, contactos!
            function renderizarContactos() {
                const ul = document.getElementById('contactList');
                ul.innerHTML = "";

                if (miUsuario.contactos.length === 0) {
                    ul.innerHTML = "<li class='list-group-item text-muted'>No tienes contactos guardados.</li>";
                    return; // si no hay contactos, retorna una triste linea de text
                    // NOTA AÑADIR BORRAR CONTACTOS 

                }

                // Usamos un índice (index) para saber exactamente a qué contacto hicimos clic
                miUsuario.contactos.forEach(function (contacto, index) {
                    const li = document.createElement('li');
                    li.className = "list-group-item";
                    // ID al Li para cambiarle el color después
                    li.id = "contacto-" + index;

                    li.innerHTML = `
                    <div class="contact-info">
                        <span class="contact-name">${contacto.nombre}</span>
                        <span class="contact-details">${contacto.banco} | RUT: ${contacto.rut}</span>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button type="button" class="btn btn-danger btn-sm" onclick="borrarContacto(${index})">Borrar</button>
                        
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="seleccionarContacto(${index})">Seleccionar</button>
                    </div>
                `;
                    ul.appendChild(li);
                });
            }

            // Función que se ejecuta cuando apretamos el botón "Seleccionar" de un contacto
            window.seleccionarContacto = function (indice) {
                contactoSeleccionado = miUsuario.contactos[indice];

                const todosLosLi = document.querySelectorAll('.list-group-item');
                todosLosLi.forEach(li => li.classList.remove('contacto-seleccionado'));
                document.getElementById("contacto-" + indice).classList.add('contacto-seleccionado');

                // NUEVO: Encendemos el botón de transferir
                document.getElementById('btnTransferir').disabled = false;
            };

            // Eliminar contactos
            window.borrarContacto = function (indice) {
                // 1. Confirmación de seguridad (para evitar borrados accidentales)
                const nombreABorrar = miUsuario.contactos[indice].nombre;
                if (confirm("¿Estás seguro de que deseas eliminar a " + nombreABorrar + " de tus contactos?")) {

                    // 2. La Extirpación: .splice() quita 1 elemento de la lista ubicado en la posición 'indice'
                    miUsuario.contactos.splice(indice, 1);

                    // 3. Guardamos los cambios en la bóveda (localStorage)
                    localStorage.setItem('usuariosBanco', JSON.stringify(listaUsuarios));

                    // 4. Por seguridad, reseteamos la selección actual para no transferir a un fantasma
                    contactoSeleccionado = null;
                    document.getElementById('btnTransferir').disabled = true;

                    // 5. Volvemos a dibujar la pantalla
                    renderizarContactos();
                }
            };

            renderizarContactos(); // Dibujar al inicio

            // 3. Agregar contacto, agregar datos, borrar posibles espacios vacios del frente
            document.getElementById('btnAgregar').addEventListener('click', function () {
                const nombre = document.getElementById('nuevoNombre').value.trim();
                const banco = document.getElementById('nuevoBanco').value.trim();
                const rut = document.getElementById('nuevoRut').value.trim();

                if (nombre === "" || banco === "" || rut === "") { //como me vay a dejar espacios vacios po
                    mostrarMensaje("Alerta", "Completa todos los datos.");
                    return;
                }

                miUsuario.contactos.push({ nombre: nombre, banco: banco, rut: rut });
                localStorage.setItem('usuariosBanco', JSON.stringify(listaUsuarios));

                document.getElementById('nuevoNombre').value = "";
                document.getElementById('nuevoBanco').value = "";
                document.getElementById('nuevoRut').value = "";
                renderizarContactos();
            });

            // Get transferir, escuchar click
            document.getElementById('btnTransferir').addEventListener('click', function () {
                // A quien eligio? si no eligio a nadie, alera po, como vay a regalar plata!!
                if (contactoSeleccionado === null) {
                    mostrarMensaje("Error", "Por favor selecciona un contacto de tu lista primero.", "error");
                    return;
                }

                const inputMonto = document.getElementById('montoTransferencia').value;
                const monto = parseFloat(inputMonto);

                // Checkar chistositos transfiriendo 0 o negativos
                if (isNaN(monto) || monto <= 0) {
                    mostrarMensaje("Error", "Ingresa un monto válido mayor a 0.", "error");
                    return;
                }

                // checkar saldo suficiente, no hay dinero infinito por suerte o desgracia
                if (monto > miUsuario.saldo) {
                    mostrarMensaje("Error", "Fondos insuficientes. Tu saldo es de $" + miUsuario.saldo, "error");
                    return;
                }

                // Si pasa todas las validaciones... ¡Hacemos la transferencia!

                // Restamos el dinero de su cuenta
                miUsuario.saldo = miUsuario.saldo - monto;
                // Si no tiene historial, le creamos la lista (porsiacaso, cuentas antiguas del localstorage o posibles errores)
                if (miUsuario.historial === undefined) {
                    miUsuario.historial = [];
                }

                // Guardamos el recibo de la transferencia para agregarlos al historial después
                miUsuario.historial.push({
                    tipo: "Transferencia a " + contactoSeleccionado.nombre,
                    monto: "-" + monto,
                    fecha: new Date().toLocaleString()
                });
                // Guardamos los cambios en el localstorage
                localStorage.setItem('usuariosBanco', JSON.stringify(listaUsuarios));

                // Mensaje de éxito
                mostrarMensaje("¡Éxito!", "Has transferido $" + monto + " a " + contactoSeleccionado.nombre + ".", "exito", "menu.html");

                // Redirigimos al menú para que vea su nuevo saldo rebajado
                // quizás redireccionar a otro lado?
                //window.location.href = "menu.html"; probando cositas~ BORRAR
            });
        } //cierre del else del inicio
    </script>

</body>

</html>
